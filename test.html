<!DOCTYPE html>
<html>

<head>
  <style>
    body {
      background: #111;
      color: white;
      padding: 50px;
    }

    .btn {
      position: relative;
      width: 200px;
      height: 50px;
      border-radius: 999px;
      display: flex;
      align-items: center;
      justify-content: center;
      background: rgba(255, 255, 255, 0.05);
      backdrop-filter: blur(10px);
    }

    .border-glow {
      position: absolute;
      inset: 0;
      border-radius: 999px;
      padding: 1px;
      mask: linear-gradient(#fff 0 0) content-box, linear-gradient(#fff 0 0);
      -webkit-mask: linear-gradient(#fff 0 0) content-box, linear-gradient(#fff 0 0);
      mask-composite: exclude;
      -webkit-mask-composite: xor;
      overflow: hidden;
    }

    .spinner {
      position: absolute;
      top: 50%;
      left: 50%;
      width: 200%;
      aspect-ratio: 1;
      transform: translate(-50%, -50%);
      background: conic-gradient(from 0deg, transparent 0%, rgba(200, 180, 255, 1) 15%, transparent 30%);
      animation: spin 3s linear infinite;
    }

    @keyframes spin {
      100% {
        transform: translate(-50%, -50%) rotate(360deg);
      }
    }
  </style>
</head>

<body>
  <div class="btn">
    <div class="border-glow">
      <div class="spinner"></div>
    </div>
    Start Forging
  </div>
</body>

</html>
